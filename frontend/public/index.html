<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TAINUX Doctor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0b1220; color: #f5f7fb; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 32px 20px; }
    .card { background: #121a2b; border: 1px solid #26304a; border-radius: 14px; padding: 20px; margin-bottom: 20px; }
    textarea, input { width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid #31405f; padding: 12px; background: #0f1728; color: #fff; }
    button { background: #2f6feb; color: #fff; border: 0; padding: 12px 16px; border-radius: 10px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .muted { color: #9fb0cf; }
    .pre { white-space: pre-wrap; background: #0b1220; padding: 14px; border-radius: 10px; border: 1px solid #26304a; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>TAINUX Doctor</h1>
    <p class="muted">AI-powered troubleshooting for Kubernetes, OKD and OpenShift.</p>

    <div class="card">
      <div class="grid">
        <div>
          <label>API URL</label>
          <input id="apiUrl" value="" placeholder="https://tainux-doctor-api.apps.cluster.example.com" />
        </div>
        <div>
          <label>Namespace</label>
          <input id="namespace" value="default" />
        </div>
      </div>
      <div style="height: 12px"></div>
      <label>Pod name</label>
      <input id="resourceName" placeholder="Optional. Example: my-app-6c8f9d7c8d-abcde" />
      <div style="height: 12px"></div>
      <label>Question</label>
      <textarea id="question" rows="5">Why is my pod crashing?</textarea>
      <div style="height: 12px"></div>
      <button onclick="runDiagnosis()">Run diagnosis</button>
    </div>

    <div class="card">
      <h3>Result</h3>
      <div id="result" class="pre">No diagnosis yet.</div>
    </div>
  </div>

  <script>
    function pretty(obj) {
      return JSON.stringify(obj, null, 2);
    }

    async function runDiagnosis() {
      const apiUrl = document.getElementById('apiUrl').value.trim();
      const question = document.getElementById('question').value.trim();
      const namespace = document.getElementById('namespace').value.trim();
      const resourceName = document.getElementById('resourceName').value.trim();
      const result = document.getElementById('result');

      if (!apiUrl) {
        result.textContent = 'Please fill in the API URL.';
        return;
      }

      result.textContent = 'Running diagnosis...';

      try {
        const response = await fetch(apiUrl.replace(/\/$/, '') + '/api/v1/diagnose', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            question,
            namespace,
            resource_name: resourceName || null,
            include_logs: true
          })
        });

        const data = await response.json();
        result.textContent = pretty(data);
      } catch (err) {
        result.textContent = 'Request failed: ' + err;
      }
    }
  </script>
</body>
</html>
