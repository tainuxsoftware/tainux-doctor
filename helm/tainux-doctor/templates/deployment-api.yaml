apiVersion: apps/v1
kind: Deployment
metadata:
  name: tainux-doctor-api
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: tainux-doctor-api
  template:
    metadata:
      labels:
        app: tainux-doctor-api
    spec:
      serviceAccountName: tainux-doctor-api
      containers:
        - name: api
          image: {{ .Values.api.image }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: tainux-doctor-config
            - secretRef:
                name: tainux-doctor-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
