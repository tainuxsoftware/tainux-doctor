apiVersion: apps/v1
kind: Deployment
metadata:
  name: tainux-doctor-ui
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app: tainux-doctor-ui
  template:
    metadata:
      labels:
        app: tainux-doctor-ui
    spec:
      containers:
        - name: ui
          image: {{ .Values.ui.image }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
